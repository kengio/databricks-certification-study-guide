name: Deploy practice quiz to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'practice/**'
      - '.github/workflows/deploy-practice.yml'
  workflow_dispatch:

env:
  # Opt into Node.js 24 for all JavaScript actions ahead of the June 2026
  # deprecation deadline. See lint.yml for the same rationale.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages artifact (practice/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Disable Jekyll processing
        run: touch practice/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: practice/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
