<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Databricks Certification Practice</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400..600&display=swap">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css?v=19">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <!-- ============== STICKY TOP BAR ============== -->
  <header class="masthead" id="masthead">
    <div class="masthead-inner">
      <div class="brand-cluster">
        <a class="brand-mark" href="./" aria-label="Home">
          <svg viewBox="0 0 40 40" aria-hidden="true">
            <rect x="1" y="1" width="38" height="38" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <path d="M11 21 L17 27 L29 13" stroke="currentColor" stroke-width="2" fill="none"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <span class="brand-title">DBX Practice</span>
      </div>

      <!-- Quiz meta strip: only visible while a quiz is active -->
      <div class="quiz-meta-strip" id="quiz-meta-strip" hidden>
        <span id="quiz-cert"></span>
        <span class="rh-sep">/</span>
        <span id="quiz-domain"></span>
        <span class="rh-sep">·</span>
        <span id="quiz-difficulty" class="difficulty"></span>
        <span class="rh-sep">·</span>
        <span id="quiz-counter"></span>
      </div>

      <div class="masthead-actions">
        <span id="quiz-clock" class="meta-pill" title="Current time" aria-label="Current time"></span>
        <span id="quiz-timer" class="meta-pill timer" hidden
              title="Exam timer remaining" aria-label="Exam timer remaining"></span>
        <button type="button" id="btn-theme"
                title="Cycle theme — auto, light, dark"
                aria-label="Cycle theme">
          <span id="btn-theme-label">Auto</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ============== MAIN SCROLL AREA ============== -->
  <main id="main">
    <section id="setup">
      <p class="loading">Loading question banks…</p>
    </section>

    <section id="quiz" hidden>
      <article class="question-card">
        <p id="quiz-question"></p>
        <fieldset id="quiz-choices"></fieldset>
        <div id="quiz-feedback" hidden></div>
      </article>
    </section>

    <section id="stats" hidden>
      <button type="button" id="btn-stats-back" class="back-button">← Back to quiz</button>
      <h2>Stats</h2>
      <div id="stats-content"></div>
      <div class="stats-actions">
        <button type="button" id="btn-export" class="ghost">Export progress</button>
        <button type="button" id="btn-reset" class="ghost danger">Reset history</button>
      </div>
    </section>

    <section id="settings" hidden>
      <button type="button" id="btn-settings-cancel" class="back-button">← Back to quiz</button>
      <h2>Settings</h2>
      <div class="settings-fields">
        <label>
          <span class="field-label">Selection mode</span>
          <select id="setting-mode">
            <option value="adaptive">Adaptive — weight toward gaps</option>
            <option value="random">Random — uniform</option>
            <option value="sequential">Sequential — in order</option>
          </select>
        </label>
        <label>
          <span class="field-label">Filter by domain</span>
          <select id="setting-domain">
            <option value="">All domains</option>
          </select>
        </label>
        <label>
          <span class="field-label">Filter by difficulty</span>
          <select id="setting-difficulty">
            <option value="">All difficulties</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </label>
        <label>
          <span class="field-label">Exam timer</span>
          <select id="setting-timer">
            <option value="0">None — practice mode</option>
            <option value="30">30 minutes</option>
            <option value="60">60 minutes</option>
            <option value="90">90 minutes — Associate exam length</option>
            <option value="120">120 minutes — Professional exam length</option>
          </select>
        </label>
      </div>
      <div class="settings-actions">
        <button type="button" id="btn-settings-apply" class="primary">Apply</button>
      </div>
    </section>
  </main>

  <!-- ============== STICKY BOTTOM ACTION BAR (quiz mode only) ============== -->
  <div class="actionbar" id="actionbar" hidden>
    <div class="actionbar-inner">
      <div class="actionbar-left">
        <button type="button" id="btn-submit" class="primary" disabled>Submit</button>
        <button type="button" id="btn-skip" class="ghost">Skip</button>
        <button type="button" id="btn-next" class="primary" hidden>Next question</button>
        <span class="kbd-hint" aria-hidden="true" id="kbd-hint-pre">
          <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>4</kbd> or <kbd>↑</kbd><kbd>↓</kbd> select &nbsp;
          <kbd>↵</kbd> / <kbd>Space</kbd> submit &nbsp;
          <kbd>S</kbd> skip
        </span>
        <span class="kbd-hint" aria-hidden="true" id="kbd-hint-post" hidden>
          <kbd>↵</kbd> / <kbd>Space</kbd> / <kbd>N</kbd> / <kbd>→</kbd> next question
        </span>
      </div>
      <div class="actionbar-right">
        <span id="session-stats">0/0</span>
        <span class="rh-sep">·</span>
        <span id="bank-stats"></span>
        <span class="actionbar-divider"></span>
        <button type="button" id="btn-stats" class="link">Stats</button>
        <button type="button" id="btn-settings" class="link">Settings</button>
        <button type="button" id="btn-reset-top" class="link danger" title="Reset progress for this bank">Reset</button>
        <button type="button" id="btn-exit" class="link">Switch bank</button>
      </div>
    </div>
  </div>

  <footer class="page-footer">
    <p>
      A study aid, not the official exam.
      <a href="https://github.com/kengio/databricks-certification-study-guide">View on GitHub</a>
      <span class="rh-sep">·</span>
      <span class="colophon">MIT</span>
      <span class="rh-sep">·</span>
      © 2026 <a href="https://github.com/kengio">@kengio</a>
    </p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"
          data-manual crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-scala.min.js" crossorigin="anonymous"></script>
  <script src="app.js?v=19"></script>
</body>
</html>
